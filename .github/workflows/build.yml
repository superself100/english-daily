name: Build Daily English Page

on:
  push:
    paths:
      - 'data-*.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build index.html and article page
        run: |
          python3 << 'EOF'
          import json, glob, os, re

          files = sorted(glob.glob('data-*.json'))
          if not files:
              print("No data files found")
              exit(1)

          # fix 파일 우선 선택, 없으면 가장 마지막 파일
          fix_files = [f for f in files if 'fix' in f]
          latest = fix_files[-1] if fix_files else files[-1]

          date_match = re.search(r'data-(\d{4}-\d{2}-\d{2})', latest)
          date_str = date_match.group(1) if date_match else '2026-05-10'
          print(f"Using {latest}, date: {date_str}")

          with open(latest, 'r', encoding='utf-8') as f:
              data = json.load(f)

          skip_keys = ['LAST_TOPICS']

          # index.html 생성
          with open('template.html', 'r', encoding='utf-8') as f:
              html = f.read()
          for key, value in data.items():
              if key not in skip_keys:
                  html = html.replace('{{' + key + '}}', str(value))
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print("index.html built")

          # article-날짜.html 생성
          with open('article-template.html', 'r', encoding='utf-8') as f:
              article_html = f.read()
          article_html = article_html.replace('{{ARTICLE_DATE}}', date_str)
          for key, value in data.items():
              if key not in skip_keys:
                  article_html = article_html.replace('{{' + key + '}}', str(value))
          article_filename = f'article-{date_str}.html'
          with open(article_filename, 'w', encoding='utf-8') as f:
              f.write(article_html)
          print(f"{article_filename} built")

          EOF

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html article-*.html
          git commit -m "Daily update $(date +'%Y-%m-%d')" || echo "No changes"
          git push
