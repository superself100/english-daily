<!DOCTYPE html>
<html lang="ko">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-37ZZZ1VHS3"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-37ZZZ1VHS3');

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily 10 — 오늘의 영어 10분</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F5F0; --surface: #FFFFFF; --border: #E4E0D8;
      --text: #1A1814; --muted: #6B6660;
      --accent: #2D6A4F; --accent-light: #E8F4EF;
      --accent2: #C77B3A; --accent2-light: #FDF0E4;
      --danger: #C0392B; --danger-light: #FDECEA;
      --highlight-word: #FFF3CD; --highlight-phrase: #D4EDDA;
      --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.7; }

    /* TOP BAR */
    .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--accent); letter-spacing: -0.5px; white-space: nowrap; }
    .logo span { color: var(--accent2); }
    .progress-steps { display: flex; gap: 8px; align-items: center; margin-left: 8px; }
    .step { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); white-space: nowrap; }
    .step-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; transition: all .3s; }
    .step-dot.done { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-arrow { color: var(--border); font-size: 11px; }
    .timer-wrap { margin-left: auto; display: flex; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 30px; padding: 6px 14px; }
    .timer-display { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); min-width: 52px; text-align: center; transition: color .3s; }
    .timer-display.urgent { color: var(--danger); }
    .timer-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 2px 4px; color: var(--muted); transition: color .2s; }
    .timer-btn:hover { color: var(--accent); }

    /* LAYOUT */
    .layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; max-width: 1100px; margin: 0 auto; padding: 24px 20px; align-items: start; }
    @media (max-width: 800px) { .layout { grid-template-columns: 1fr; } .top-bar { flex-wrap: wrap; } .progress-steps { order: 3; width: 100%; } .timer-wrap { margin-left: 0; } }

    /* CARDS */
    .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
    .card-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ARTICLE */
    .article-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tag { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); }
    .tag.orange { background: var(--accent2-light); color: var(--accent2); }
    .meta-date { font-size: 12px; color: var(--muted); margin-left: auto; }
    .article-title { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.35; margin-bottom: 16px; color: var(--text); }
    .article-body { font-size: 16px; line-height: 1.85; color: #2A2724; }
    .word-hl { background: var(--highlight-word); border-radius: 3px; padding: 0 3px; cursor: pointer; border-bottom: 2px solid #F0C040; transition: background .2s; }
    .word-hl:hover { background: #FFE999; }
    .phrase-hl { background: var(--highlight-phrase); border-radius: 3px; padding: 0 3px; cursor: pointer; border-bottom: 2px solid var(--accent); transition: background .2s; }
    .phrase-hl:hover { background: #C3E6CB; }
    .legend { display: flex; gap: 16px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 6px; border-radius: 3px; }
    .dot-word { background: #F0C040; } .dot-phrase { background: var(--accent); }
    .read-done-btn { margin-top: 16px; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; }
    .read-done-btn:hover { opacity: .85; }
    .read-done-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

    /* VOCAB */
    .vocab-toggle-btn { width: 100%; background: none; border: none; text-align: left; cursor: pointer; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: var(--text); border-bottom: 1px solid var(--border); transition: color .2s; }
    .vocab-toggle-btn:hover { color: var(--accent); }
    .vocab-toggle-btn .arrow { font-size: 13px; transition: transform .3s; }
    .vocab-toggle-btn.open .arrow { transform: rotate(180deg); }
    .vocab-detail { display: none; padding: 12px 0 4px; font-size: 14px; }
    .vocab-detail.show { display: block; }
    .vocab-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 4px; }
    .vocab-en { font-weight: 600; color: var(--accent); min-width: 110px; }
    .vocab-kr { color: var(--muted); font-size: 13px; }
    .vocab-ex { color: #555; font-size: 13px; font-style: italic; padding-left: 118px; margin-bottom: 10px; }
    .vocab-section-title { font-size: 12px; font-weight: 600; color: var(--accent2); text-transform: uppercase; letter-spacing: .08em; margin: 14px 0 6px; }
    .vocab-learn-btn { margin-top: 12px; background: var(--accent-light); color: var(--accent); border: none; border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
    .vocab-learn-btn:hover { background: #D0EBDF; }
    .vocab-learn-btn:disabled { opacity: .5; cursor: default; }

    /* QUIZ */
    .quiz-section-title { font-size: 13px; font-weight: 600; color: var(--accent2); margin: 18px 0 10px; text-transform: uppercase; letter-spacing: .06em; }
    .quiz-q { margin-bottom: 16px; padding: 14px 16px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .quiz-q-text { font-size: 15px; font-weight: 500; margin-bottom: 10px; }
    .quiz-input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: inherit; background: var(--surface); color: var(--text); transition: border-color .2s; }
    .quiz-input:focus { outline: none; border-color: var(--accent); }
    .ox-options { display: flex; gap: 10px; }
    .ox-btn { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 8px; background: var(--surface); font-size: 18px; cursor: pointer; transition: all .2s; font-weight: 600; }
    .ox-btn:hover { border-color: var(--accent); }
    .ox-btn.selected { border-color: var(--accent); background: var(--accent-light); }
    .quiz-feedback { font-size: 13px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; display: none; }
    .quiz-feedback.correct { display: block; background: var(--accent-light); color: var(--accent); }
    .quiz-feedback.wrong { display: block; background: var(--danger-light); color: var(--danger); }
    .submit-quiz-btn { width: 100%; background: var(--accent2); color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
    .submit-quiz-btn:hover { opacity: .85; }
    .score-banner { text-align: center; padding: 20px; background: var(--accent-light); border-radius: 10px; margin-top: 14px; display: none; }
    .score-banner.show { display: block; }
    .score-num { font-family: 'DM Serif Display', serif; font-size: 40px; color: var(--accent); }
    .score-msg { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* SIDEBAR */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; text-align: center; box-shadow: var(--shadow); }
    .stat-val { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--accent); display: block; }
    .stat-val.orange { color: var(--accent2); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* CALENDAR */
    .cal-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); padding: 18px; box-shadow: var(--shadow); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-month { font-family: 'DM Serif Display', serif; font-size: 17px; color: var(--text); }
    .cal-nav { background: none; border: 1px solid var(--border); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 14px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all .2s; }
    .cal-nav:hover { border-color: var(--accent); color: var(--accent); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-dow { text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); padding: 4px 0; }
    .cal-day { text-align: center; padding: 5px 2px; border-radius: 6px; font-size: 12px; cursor: pointer; position: relative; min-height: 32px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: background .15s; color: var(--text); }
    .cal-day:hover { background: var(--bg); }
    .cal-day.empty { cursor: default; }
    .cal-day.today { background: var(--accent); color: #fff; font-weight: 700; }
    .cal-day.done-day .done-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; margin-top: 2px; }
    .cal-day.today .done-dot { background: #fff; }

    /* LOADING */
    .loading-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { text-align: center; padding: 30px; color: var(--danger); background: var(--danger-light); border-radius: var(--radius); }

    /* POPUP */
    .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200; align-items: center; justify-content: center; }
    .popup-overlay.show { display: flex; }
    .popup-box { background: var(--surface); border-radius: var(--radius); padding: 28px; max-width: 380px; width: 90%; box-shadow: 0 12px 40px rgba(0,0,0,.18); position: relative; }
    .popup-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
    .popup-date { font-size: 12px; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .popup-title { font-family: 'DM Serif Display', serif; font-size: 18px; margin-bottom: 12px; }
    .popup-row { display: flex; justify-content: space-between; font-size: 14px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .popup-row:last-child { border-bottom: none; }
    .popup-row .label { color: var(--muted); }
    .popup-row .val { font-weight: 600; }
    .popup-score { color: var(--accent); }
    .popup-view-btn { margin-top: 14px; width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s; display: block; text-align: center; text-decoration: none; }
    .popup-view-btn:hover { opacity: .85; }

    /* FOOTER */
    .site-footer { text-align: center; padding: 24px 20px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); margin-top: 20px; }
    .site-footer a { color: var(--muted); text-decoration: none; }
    .site-footer a:hover { color: var(--accent); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 14px; opacity: 0; transition: all .4s; z-index: 300; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 500px) { .article-title { font-size: 18px; } .top-bar { padding: 10px 14px; gap: 10px; } .layout { padding: 14px 12px; } .card { padding: 16px; } }
  </style>
</head>
<body>
<div class="top-bar">
  <div class="logo">Daily<span>10</span></div>
  <div class="progress-steps">
    <div class="step"><div class="step-dot" id="step1">1</div><span>읽기</span></div>
    <span class="step-arrow">›</span>
    <div class="step"><div class="step-dot" id="step2">2</div><span>단어</span></div>
    <span class="step-arrow">›</span>
    <div class="step"><div class="step-dot" id="step3">3</div><span>퀴즈</span></div>
  </div>
  <div class="timer-wrap">
    <div class="timer-display" id="timerDisplay">10:00</div>
    <button class="timer-btn" id="timerStartBtn">▶</button>
    <button class="timer-btn" id="timerResetBtn">↺</button>
  </div>
</div>

<div class="layout">
  <div class="main-col" id="mainCol">
    <!-- 로딩 상태 -->
    <div class="card" id="loadingCard">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <div>오늘의 기사를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="stats-row">
      <div class="stat-box"><span class="stat-val" id="monthCount">0</span><div class="stat-label">이번 달 학습일</div></div>
      <div class="stat-box"><span class="stat-val orange" id="streakCount">0</span><div class="stat-label">🔥 연속 학습일</div></div>
    </div>
    <div class="cal-card">
      <div class="cal-header">
        <button class="cal-nav" id="prevMonth">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav" id="nextMonth">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  © 2026 Daily10 · <a href="/privacy.html">개인정보처리방침</a>
</footer>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <button class="popup-close" onclick="closePopup()">✕</button>
    <div class="popup-date" id="popupDate"></div>
    <div class="popup-title" id="popupTitle"></div>
    <div id="popupRows"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────
// 설정
// ─────────────────────────────────────────
const GITHUB_RAW = 'https://raw.githubusercontent.com/superself100/english-daily/main/';
const STORE_KEY = 'daily10_records';

// ─────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function formatKorDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
}
function getRecords() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch { return {}; }
}
function saveRecord(dateStr, data) {
  const rec = getRecords();
  rec[dateStr] = { ...rec[dateStr], ...data };
  localStorage.setItem(STORE_KEY, JSON.stringify(rec));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────
// JSON 로딩
// ─────────────────────────────────────────
async function loadDayData(dateStr) {
  const url = GITHUB_RAW + 'data-' + dateStr + '.json?t=' + Date.now();
  const res = await fetch(url);
  if (!res.ok) throw new Error('데이터 없음: ' + dateStr);
  return await res.json();
}

// ─────────────────────────────────────────
// 메인 렌더링
// ─────────────────────────────────────────
let currentData = null;
let currentDateStr = null;
const oxSelections = {};

async function renderDay(dateStr) {
  const mainCol = document.getElementById('mainCol');
  mainCol.innerHTML = `<div class="card"><div class="loading-state"><div class="loading-spinner"></div><div>기사를 불러오는 중...</div></div></div>`;

  let d;
  try {
    d = await loadDayData(dateStr);
  } catch (e) {
    mainCol.innerHTML = `<div class="card"><div class="error-state">📭 ${dateStr} 기사를 찾을 수 없어요.<br><small>아직 업로드되지 않았거나 존재하지 않는 날짜입니다.</small></div></div>`;
    return;
  }

  currentData = d;
  currentDateStr = dateStr;

  const isToday = dateStr === todayStr();
  const rec = getRecords()[dateStr] || {};

  // ── 기사 카드 ──
  const articleCard = document.createElement('div');
  articleCard.className = 'card';
  articleCard.id = 'articleCard';
  articleCard.innerHTML = `
    <div class="card-label">📰 ${isToday ? '오늘의 본문' : dateStr + ' 본문'}</div>
    <div class="article-meta">
      <span class="tag">${d.TAG1 || ''}</span>
      <span class="tag orange">${d.TAG2 || ''}</span>
      <span class="meta-date">${formatKorDate(dateStr)}</span>
    </div>
    <div class="article-title">${d.ARTICLE_TITLE || ''}</div>
    <div class="article-body">${d.ARTICLE_BODY || ''}</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-word"></div> 핵심 단어</div>
      <div class="legend-item"><div class="legend-dot dot-phrase"></div> 핵심 구동사</div>
    </div>
    <button class="read-done-btn" id="readDoneBtn" ${rec.readDone ? 'disabled' : ''}>
      ${rec.readDone ? '✓ 읽기 완료됨' : '✓ 읽기 완료'}
    </button>
  `;

  // ── 단어 카드 ──
  const vocabCard = document.createElement('div');
  vocabCard.className = 'card';
  vocabCard.id = 'vocabCard';

  let wordsHTML = '<div class="vocab-section-title">핵심 단어 (5)</div>';
  for (let i = 1; i <= 5; i++) {
    const en = d['W' + i + 'EN'] || '';
    const kr = d['W' + i + 'KR'] || '';
    const ex = d['W' + i + 'EX'] || '';
    if (!en) continue;
    wordsHTML += `
      <button class="vocab-toggle-btn" onclick="toggleVocab(this)">
        ${en} <span style="color:var(--muted);font-weight:400;font-size:13px;margin-left:6px;">${kr}</span>
        <span class="arrow">▼</span>
      </button>
      <div class="vocab-detail">
        <div class="vocab-row"><span class="vocab-en">${en}</span><span class="vocab-kr">${kr}</span></div>
        <div class="vocab-ex">"${ex}"</div>
      </div>
    `;
  }

  let phrasesHTML = '<div class="vocab-section-title" style="margin-top:20px;">핵심 구동사 (3)</div>';
  for (let i = 1; i <= 3; i++) {
    const en = d['P' + i + 'EN'] || '';
    const kr = d['P' + i + 'KR'] || '';
    const ex = d['P' + i + 'EX'] || '';
    if (!en) continue;
    phrasesHTML += `
      <button class="vocab-toggle-btn" onclick="toggleVocab(this)">
        ${en} <span style="color:var(--muted);font-weight:400;font-size:13px;margin-left:6px;">${kr}</span>
        <span class="arrow">▼</span>
      </button>
      <div class="vocab-detail">
        <div class="vocab-row"><span class="vocab-en">${en}</span><span class="vocab-kr">${kr}</span></div>
        <div class="vocab-ex">"${ex}"</div>
      </div>
    `;
  }

  vocabCard.innerHTML = `
    <div class="card-label">📚 단어 · 구동사 해설</div>
    ${wordsHTML}
    ${phrasesHTML}
    <button class="vocab-learn-btn" id="vocabDoneBtn" onclick="markVocabDone()" ${rec.vocabDone ? 'disabled' : ''}>
      ${rec.vocabDone ? '✓ 단어 학습 완료됨' : '✓ 단어 학습 완료'}
    </button>
  `;

  // ── 퀴즈 카드 ──
  const quizCard = document.createElement('div');
  quizCard.className = 'card';
  quizCard.id = 'quizCard';

  // 빈칸 퀴즈
  let fillHTML = '<div class="quiz-section-title">Part 1 — 빈칸 채우기</div>';
  for (let i = 1; i <= 3; i++) {
    const q = d['Q' + i] || '';
    const hint = d['HINT' + i + 'KR'] || '';
    if (!q) continue;
    fillHTML += `
      <div class="quiz-q">
        <div class="quiz-q-text">Q${i}. ${q}<br>
          <small style="color:var(--muted);">힌트: ${hint}</small>
        </div>
        <input class="quiz-input" id="q${i}" type="text" placeholder="답을 입력하세요">
        <div class="quiz-feedback" id="fb${i}"></div>
      </div>
    `;
  }

  // 한→영 퀴즈
  let transHTML = '<div class="quiz-section-title">Part 2 — 한→영 번역</div>';
  for (let i = 4; i <= 5; i++) {
    const q = d['Q' + i] || '';
    if (!q) continue;
    transHTML += `
      <div class="quiz-q">
        <div class="quiz-q-text">Q${i}. ${q}</div>
        <input class="quiz-input" id="q${i}" type="text" placeholder="영어로 쓰세요">
        <div class="quiz-feedback" id="fb${i}"></div>
      </div>
    `;
  }

  // OX 퀴즈
  let oxHTML = '<div class="quiz-section-title">Part 3 — O/X 내용 확인</div>';
  for (let i = 6; i <= 7; i++) {
    const q = d['Q' + i] || '';
    if (!q) continue;
    oxHTML += `
      <div class="quiz-q">
        <div class="quiz-q-text">Q${i}. ${q}</div>
        <div class="ox-options">
          <button class="ox-btn" data-q="${i}" data-val="O" onclick="selectOX(this)">O</button>
          <button class="ox-btn" data-q="${i}" data-val="X" onclick="selectOX(this)">X</button>
        </div>
        <div class="quiz-feedback" id="fb${i}"></div>
      </div>
    `;
  }

  quizCard.innerHTML = `
    <div class="card-label">🎯 오늘의 퀴즈</div>
    ${fillHTML}
    ${transHTML}
    ${oxHTML}
    <button class="submit-quiz-btn" id="submitQuizBtn" onclick="submitQuiz()">채점하기</button>
    <div class="score-banner" id="scoreBanner">
      <div class="score-num" id="scoreNum">0/7</div>
      <div class="score-msg" id="scoreMsg"></div>
    </div>
  `;

  // ── DOM에 삽입 ──
  mainCol.innerHTML = '';
  mainCol.appendChild(articleCard);
  mainCol.appendChild(vocabCard);
  mainCol.appendChild(quizCard);

  // ── 이벤트 바인딩 ──
  document.getElementById('readDoneBtn').addEventListener('click', () => {
    saveRecord(dateStr, { readDone: true, title: d.ARTICLE_TITLE, topic: d.TAG1 + ' · ' + d.TAG2 });
    document.getElementById('readDoneBtn').textContent = '✓ 읽기 완료됨';
    document.getElementById('readDoneBtn').disabled = true;
    markStep(1);
    showToast('읽기 완료! ✅');
    renderCalendar();
  });

  // ── 저장된 퀴즈 점수 복원 ──
  if (rec.quizScore != null) {
    document.getElementById('scoreNum').textContent = rec.quizScore + '/7';
    document.getElementById('scoreMsg').textContent = '저장된 기록이 있어요 ✅';
    document.getElementById('scoreBanner').classList.add('show');
    document.getElementById('submitQuizBtn').textContent = '다시 채점';
  }

  checkTodaySteps();
}

// ─────────────────────────────────────────
// 퀴즈 로직
// ─────────────────────────────────────────
function selectOX(btn) {
  const q = btn.dataset.q;
  btn.parentElement.querySelectorAll('.ox-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  oxSelections[q] = btn.dataset.val;
}

function submitQuiz() {
  if (!currentData) return;
  const d = currentData;
  let score = 0;

  function checkFill(qNum, keyword) {
    const val = (document.getElementById('q' + qNum)?.value || '').trim().toLowerCase();
    const ans = (d['A' + qNum] || '').toLowerCase();
    const correct = val.includes(ans) || val.includes(keyword?.toLowerCase() || '');
    const fb = document.getElementById('fb' + qNum);
    if (correct) {
      score++;
      fb.textContent = '✓ 정답!';
      fb.className = 'quiz-feedback correct';
    } else {
      fb.textContent = '✗ 정답: ' + d['A' + qNum];
      fb.className = 'quiz-feedback wrong';
    }
  }

  function checkTrans(qNum, keyword) {
    const val = (document.getElementById('q' + qNum)?.value || '').toLowerCase();
    const correct = val.includes((keyword || '').toLowerCase());
    const fb = document.getElementById('fb' + qNum);
    if (correct) {
      score++;
      fb.textContent = '✓ 정답! ' + keyword + ' 포함됐어요.';
      fb.className = 'quiz-feedback correct';
    } else {
      fb.textContent = '✗ ' + keyword + ' 를 포함하세요.';
      fb.className = 'quiz-feedback wrong';
    }
  }

  function checkOX(qNum) {
    const userAns = oxSelections[qNum] || '';
    const correctAns = d['OX' + qNum] || '';
    const exp = d['EXP' + qNum] || '';
    const correct = userAns === correctAns;
    const fb = document.getElementById('fb' + qNum);
    if (correct) {
      score++;
      fb.textContent = '✓ 정답! ' + exp;
      fb.className = 'quiz-feedback correct';
    } else {
      fb.textContent = '✗ ' + exp;
      fb.className = 'quiz-feedback wrong';
    }
  }

  checkFill(1, d.A1);
  checkFill(2, d.A2);
  checkFill(3, d.A3);
  checkTrans(4, d.P1EN);
  checkTrans(5, d.P2EN);
  checkOX(6);
  checkOX(7);

  const msgs = ['한 번 더 도전해봐요! 💪', '잘 했어요! 계속 해봐요 😊', '훌륭해요! 거의 다 왔어요 👍', '완벽해요! 오늘 최고예요 🏆'];
  document.getElementById('scoreNum').textContent = score + '/7';
  document.getElementById('scoreMsg').textContent = score <= 2 ? msgs[0] : score <= 4 ? msgs[1] : score <= 6 ? msgs[2] : msgs[3];
  document.getElementById('scoreBanner').classList.add('show');
  document.getElementById('submitQuizBtn').textContent = '다시 채점';

  saveRecord(currentDateStr, { quizScore: score, quizTotal: 7, completed: score >= 5, title: currentData.ARTICLE_TITLE, topic: currentData.TAG1 });
  markStep(3);
  renderCalendar();
  updateStats();
  showToast('퀴즈 완료! ' + score + '/7 점 🎉');
}

// ─────────────────────────────────────────
// 단어 토글
// ─────────────────────────────────────────
function toggleVocab(btn) {
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('show');
}

function markVocabDone() {
  const btn = document.getElementById('vocabDoneBtn');
  saveRecord(currentDateStr, { vocabDone: true });
  btn.textContent = '✓ 단어 학습 완료됨';
  btn.disabled = true;
  markStep(2);
  showToast('단어 학습 완료! ✅');
  renderCalendar();
}

// ─────────────────────────────────────────
// 스텝 표시
// ─────────────────────────────────────────
function markStep(n) {
  document.getElementById('step' + n)?.classList.add('done');
}
function checkTodaySteps() {
  const rec = getRecords()[todayStr()];
  if (!rec) return;
  if (rec.readDone) markStep(1);
  if (rec.vocabDone) markStep(2);
  if (rec.quizScore != null) markStep(3);
}

// ─────────────────────────────────────────
// 타이머
// ─────────────────────────────────────────
let timerSec = 600, timerRunning = false, timerInterval = null;
const timerDisplay = document.getElementById('timerDisplay');
const timerStartBtn = document.getElementById('timerStartBtn');

function renderTimer() {
  const m = Math.floor(timerSec / 60).toString().padStart(2, '0');
  const s = (timerSec % 60).toString().padStart(2, '0');
  timerDisplay.textContent = m + ':' + s;
  timerDisplay.classList.toggle('urgent', timerSec <= 60);
}

timerStartBtn.addEventListener('click', () => {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false; timerStartBtn.textContent = '▶';
  } else {
    timerRunning = true; timerStartBtn.textContent = '⏸';
    timerInterval = setInterval(() => {
      if (timerSec <= 0) {
        clearInterval(timerInterval); timerRunning = false; timerStartBtn.textContent = '▶';
        showToast('⏰ 10분 완료! 오늘도 수고했어요 🎉');
      } else { timerSec--; renderTimer(); }
    }, 1000);
  }
});
document.getElementById('timerResetBtn').addEventListener('click', () => {
  clearInterval(timerInterval); timerRunning = false; timerSec = 600; renderTimer(); timerStartBtn.textContent = '▶';
});
renderTimer();

// ─────────────────────────────────────────
// 캘린더
// ─────────────────────────────────────────
let calYear = new Date().getFullYear(), calMonth = new Date().getMonth();

function renderCalendar() {
  const records = getRecords();
  const today = new Date();
  document.getElementById('calMonthLabel').textContent = calYear + '년 ' + (calMonth + 1) + '월';
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let day = 1; day <= daysInMonth; day++) {
    const el = document.createElement('div'); el.className = 'cal-day';
    const dateStr = calYear + '-' + String(calMonth + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === day;
    if (isToday) el.classList.add('today');
    const rec = records[dateStr];
    const numEl = document.createElement('div'); numEl.textContent = day; el.appendChild(numEl);
    if (rec && rec.readDone) {
      el.classList.add('done-day');
      const dot = document.createElement('div'); dot.className = 'done-dot'; el.appendChild(dot);
    }
    // 날짜 클릭 → 해당 날 기사 로드
    el.addEventListener('click', () => {
      if (rec) showPopup(dateStr, rec);
      else renderDay(dateStr); // 기록 없어도 기사는 볼 수 있음
    });
    grid.appendChild(el);
  }
  updateStats();
}

function updateStats() {
  const records = getRecords();
  const today = new Date();
  const ym = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
  let monthCount = 0;
  Object.keys(records).forEach(k => { if (k.startsWith(ym) && records[k].readDone) monthCount++; });
  document.getElementById('monthCount').textContent = monthCount;
  let streak = 0;
  const check = new Date();
  while (true) {
    const key = check.toISOString().slice(0, 10);
    if (records[key] && records[key].readDone) { streak++; check.setDate(check.getDate() - 1); } else break;
  }
  document.getElementById('streakCount').textContent = streak;
}

// ─────────────────────────────────────────
// 팝업 (캘린더 클릭 시 기록 보기)
// ─────────────────────────────────────────
function showPopup(dateStr, rec) {
  document.getElementById('popupDate').textContent = dateStr;
  document.getElementById('popupTitle').textContent = rec.title || '기록 없음';
  const rows = document.getElementById('popupRows');
  rows.innerHTML = `
    <div class="popup-row"><span class="label">주제</span><span class="val">${rec.topic || '-'}</span></div>
    <div class="popup-row"><span class="label">읽기</span><span class="val">${rec.readDone ? '✓ 완료' : '미완료'}</span></div>
    <div class="popup-row"><span class="label">단어 학습</span><span class="val">${rec.vocabDone ? '✓ 완료' : '미완료'}</span></div>
    <div class="popup-row"><span class="label">퀴즈 점수</span><span class="val popup-score">${rec.quizScore != null ? rec.quizScore + '/' + rec.quizTotal : '-'}</span></div>
    <div class="popup-row"><span class="label">학습 완료</span><span class="val">${rec.completed ? '✅ 완료' : '진행 중'}</span></div>
  `;
  // 본문 보기 버튼
  const btn = document.createElement('button');
  btn.className = 'popup-view-btn';
  btn.textContent = '📖 본문 보기';
  btn.addEventListener('click', () => { closePopup(); renderDay(dateStr); window.scrollTo({ top: 0, behavior: 'smooth' }); });
  rows.appendChild(btn);
  document.getElementById('popupOverlay').classList.add('show');
}

function closePopup() { document.getElementById('popupOverlay').classList.remove('show'); }
document.getElementById('popupOverlay').addEventListener('click', function(e) { if (e.target === this) closePopup(); });
document.getElementById('prevMonth').addEventListener('click', () => { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); });
document.getElementById('nextMonth').addEventListener('click', () => { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCalendar(); });

// ─────────────────────────────────────────
// 초기 실행
// ─────────────────────────────────────────
renderCalendar();
renderDay(todayStr());
</script>
</body>
</html>
